<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TronLink Signer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f0f;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  .container {
    background: #1a1a2e;
    border-radius: 16px;
    padding: 32px;
    max-width: 480px;
    width: 100%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  h1 {
    font-size: 20px;
    margin-bottom: 8px;
    color: #fff;
  }
  .type-badge {
    display: inline-block;
    background: #2a2a4e;
    color: #8888cc;
    padding: 4px 12px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 20px;
  }
  .detail-row {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid #2a2a3e;
    font-size: 14px;
  }
  .detail-row .label { color: #888; }
  .detail-row .value {
    color: #e0e0e0;
    word-break: break-all;
    text-align: right;
    max-width: 60%;
  }
  .status {
    margin-top: 20px;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.5;
  }
  .status.info    { background: #1a2a4e; color: #6ea8fe; }
  .status.success { background: #1a3a2a; color: #75d9a0; }
  .status.error   { background: #3a1a1a; color: #f87171; }
  .status.waiting { background: #3a3a1a; color: #fbbf24; }
  .buttons {
    display: flex;
    gap: 12px;
    margin-top: 24px;
  }
  .buttons button {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .buttons button:hover { opacity: 0.85; }
  .buttons button:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-approve { background: #c23631; color: #fff; }
  .btn-reject  { background: #2a2a3e; color: #aaa; }
  #details { margin-top: 16px; }
  .tab-bar {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 4px 2px 10px;
    margin: 0 -4px 12px;
    scrollbar-width: thin;
    scrollbar-color: #2a2a4e transparent;
  }
  .tab-bar::-webkit-scrollbar { height: 6px; }
  .tab-bar::-webkit-scrollbar-thumb { background: #2a2a4e; border-radius: 3px; }
  .tab-bar:empty { display: none; }
  .tab {
    flex: 0 0 auto;
    background: #2a2a3e;
    color: #aaa;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: background 0.15s, border-color 0.15s;
    max-width: 180px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    line-height: 1.3;
  }
  .tab:hover { background: #33334e; }
  .tab.active {
    background: #1a2a4e;
    border-color: #6ea8fe;
    color: #e0e0e0;
  }
  .tab-title {
    font-weight: 600;
    font-size: 12px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .tab-summary {
    font-size: 11px;
    color: #888;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .tab.active .tab-summary { color: #aac6ff; }
</style>
</head>
<body>
<div class="container">
  <h1>TronLink Signer</h1>
  <div id="tabBar" class="tab-bar"></div>
  <div style="display:flex;gap:8px;margin-bottom:16px;">
    <div id="typeBadge" class="type-badge" style="display:none"></div>
    <div id="networkBadge" class="type-badge" style="display:none"></div>
  </div>
  <div id="details"></div>
  <div id="status" class="status info">Loading request...</div>
  <div id="retryGroup" class="buttons" style="display:none">
    <button class="btn-approve" id="retryBtn">Retry</button>
  </div>
  <div id="buttonGroup" class="buttons" style="display:none">
    <button class="btn-approve" id="approveBtn">Approve</button>
    <button class="btn-reject" id="rejectBtn">Reject</button>
  </div>
</div>
<script src="/js/wallet.js"></script>
<script src="/js/tx-parser.js"></script>
<script src="/js/actions.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
